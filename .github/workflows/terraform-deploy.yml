name: Nunovus Personal AVD Deploy

on:
  workflow_dispatch:

jobs:

  ########################################
  # VALIDATE STAGE
  ########################################

  validate:
    name: Terraform Validate
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: envs/prod

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Azure Login
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Terraform Format
        run: terraform fmt -recursive

      - name: Terraform Init
        run: terraform init

      - name: Terraform Validate
        run: terraform validate

  ########################################
  # PLAN STAGE
  ########################################

  plan:
    name: Terraform Plan
    runs-on: ubuntu-latest

    needs: validate

    defaults:
      run:
        working-directory: envs/prod

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Azure Login
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Terraform Init
        run: terraform init

      - name: Terraform Plan
        run: terraform plan -input=false
        env:
          TF_VAR_admin_username: ${{ secrets.TF_VAR_admin_username }}
          TF_VAR_admin_password: ${{ secrets.TF_VAR_admin_password }}

  ########################################
  # APPLY FOUNDATION
  ########################################

  apply-foundation:
    name: Deploy ADDS Foundation
    runs-on: ubuntu-latest

    needs: plan

    defaults:
      run:
        working-directory: envs/prod

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Azure Login
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Terraform Init
        run: terraform init

      - name: Apply Network and ADDS
        run: |
          terraform apply -auto-approve -input=false \
          -target=module.network \
          -target=module.adds
        env:
          TF_VAR_admin_username: ${{ secrets.TF_VAR_admin_username }}
          TF_VAR_admin_password: ${{ secrets.TF_VAR_admin_password }}

  ########################################
  # WAIT FOR DOMAIN SERVICES
  ########################################

  wait-for-adds:
    name: Wait For Domain Services
    runs-on: ubuntu-latest

    needs: apply-foundation

    steps:
      - name: Wait 9 Minutes
        run: sleep 500

  ########################################
  # APPLY PERSONAL AVD
  ########################################

  apply-avd:
    name: Deploy Personal AVD
    runs-on: ubuntu-latest

    needs: wait-for-adds

    defaults:
      run:
        working-directory: envs/prod

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Azure Login
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Terraform Init
        run: terraform init

      - name: Apply Full Infrastructure
        run: terraform apply -auto-approve -input=false
        env:
          TF_VAR_admin_username: ${{ secrets.TF_VAR_admin_username }}
          TF_VAR_admin_password: ${{ secrets.TF_VAR_admin_password }}
